<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Raster Tile Preview — Park Score</title>
<style>
  body { margin: 0; background: #1a1a1a; font-family: 'JetBrains Mono', monospace; color: #ccc; }
  #controls { position: fixed; top: 12px; left: 12px; z-index: 100; background: rgba(20,20,20,0.92); padding: 12px 16px; border-radius: 6px; font-size: 12px; }
  #controls label { display: block; margin: 4px 0; }
  #controls input[type=range] { width: 160px; }
  #info { position: fixed; top: 12px; right: 12px; z-index: 100; background: rgba(20,20,20,0.92); padding: 12px 16px; border-radius: 6px; font-size: 11px; max-width: 220px; }
  #map { width: 100vw; height: 100vh; }
  .legend { display: flex; margin-top: 8px; height: 8px; border-radius: 3px; overflow: hidden; }
  .legend-label { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-top: 2px; }
</style>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
</head>
<body>
<div id="controls">
  <div style="font-weight:bold;margin-bottom:8px;color:#fff">🗺 Park Score — Raster Preview</div>
  <label>
    Raster opacity: <span id="opacity-val">80%</span><br>
    <input type="range" id="opacity" min="0" max="100" value="80">
  </label>
  <label style="margin-top:8px">
    <input type="checkbox" id="show-vector" checked> Show vector parcels (z14+)
  </label>
  <div class="legend" style="background: linear-gradient(to right, #b45028, #d48c46, #e0c89a, #beb9af, #96b98c, #469650, #1c6032)"></div>
  <div class="legend-label"><span>Far from parks</span><span>Near parks</span></div>
  <div style="margin-top:10px;font-size:10px;color:#666">
    Tiles: /raster/park_score/{z}/{x}/{y}.png<br>
    z8–z13 raster → z14+ vector
  </div>
</div>
<div id="info">
  <div style="color:#fff;font-weight:bold;margin-bottom:6px">Tile info</div>
  <div id="tile-stats">Zoom in to see parcel data</div>
</div>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'carto': {
        type: 'raster',
        tiles: ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png'],
        tileSize: 256,
        attribution: '© Carto © OpenStreetMap',
      }
    },
    layers: [{ id: 'carto', type: 'raster', source: 'carto' }],
  },
  center: [-73.98, 40.72],
  zoom: 11,
});

map.on('load', () => {
  // Raster source
  map.addSource('raster-park', {
    type: 'raster',
    tiles: [window.location.origin + '/raster/park_score/{z}/{x}/{y}.png'],
    tileSize: 256,
    minzoom: 8,
    maxzoom: 13,
  });
  map.addLayer({
    id: 'raster-park',
    type: 'raster',
    source: 'raster-park',
    maxzoom: 14,
    paint: {
      'raster-opacity': 0.8,
      'raster-fade-duration': 200,
    },
  });

  // PMTiles vector source for z14+
  const pmtilesUrl = window.location.origin + '/parcels_polygon.pmtiles';
  // Note: for local dev, point at the processed file or R2
  // We'll use the R2 URL directly for preview
  map.addSource('parcels-polygon', {
    type: 'vector',
    url: 'pmtiles://https://pub-c148dd69cdd64387884a3fe8b31e7420.r2.dev/parcels_polygon.pmtiles',
  });
  map.addLayer({
    id: 'parcels-polygon-park',
    type: 'fill',
    source: 'parcels-polygon',
    'source-layer': 'parcels_polygon',
    minzoom: 14,
    paint: {
      'fill-color': [
        'case',
        ['<', ['get', 'park_score'], 0], 'rgba(0,0,0,0)',
        ['interpolate', ['linear'], ['get', 'park_score'],
          0,   '#b45028',
          20,  '#d48c46',
          40,  '#e0c89a',
          50,  '#beb9af',
          60,  '#96b98c',
          80,  '#469650',
          100, '#1c6032',
        ]
      ],
      'fill-opacity': 0.85,
    },
  });

  // Opacity slider
  document.getElementById('opacity').addEventListener('input', (e) => {
    const v = e.target.value / 100;
    document.getElementById('opacity-val').textContent = e.target.value + '%';
    map.setPaintProperty('raster-park', 'raster-opacity', v);
  });

  // Vector toggle
  document.getElementById('show-vector').addEventListener('change', (e) => {
    map.setLayoutProperty('parcels-polygon-park', 'visibility', e.target.checked ? 'visible' : 'none');
  });

  // Update zoom info
  const updateInfo = () => {
    const z = Math.round(map.getZoom() * 10) / 10;
    const mode = z >= 14 ? '🔷 Vector parcels (PMTiles)' : '🟨 Raster heatmap';
    document.getElementById('tile-stats').innerHTML = `Zoom: ${z}<br>Mode: ${mode}`;
  };
  map.on('zoom', updateInfo);
  updateInfo();
});
</script>
</body>
</html>
